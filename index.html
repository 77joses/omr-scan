<!DOCTYPE html>
<html>
<head>
  <title>OMR v22 - Stable Pitch Mapping</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #111;
      color: white;
    }

    canvas {
      width: 100%;
      margin-top: 20px;
      background: white;
    }

    #output {
      margin-top: 20px;
      background: #222;
      padding: 10px;
      font-size: 13px;
    }
  </style>
</head>

<body>

<h2>Upload Sheet Music</h2>

<input type="file" id="fileInput" accept="image/*">
<canvas id="canvas"></canvas>

<div id="output">Ready...</div>

<script>
const input = document.getElementById("fileInput");
const output = document.getElementById("output");

input.addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;

  output.innerHTML = "Loading image...";

  const img = new Image();
  img.src = URL.createObjectURL(file);

  img.onload = () => {
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;

    ctx.drawImage(img, 0, 0);

    processImage(ctx, canvas.width, canvas.height);
  };
});

// BINARIZE
function processImage(ctx, w, h) {
  const img = ctx.getImageData(0, 0, w, h);
  const d = img.data;

  for (let i = 0; i < d.length; i += 4) {
    const avg = (d[i] + d[i+1] + d[i+2]) / 3;
    const val = avg > 165 ? 255 : 0;
    d[i] = d[i+1] = d[i+2] = val;
  }

  ctx.putImageData(img, 0, 0);

  detectStaff(ctx, w, h);
}

// STAFF LINES
function detectStaff(ctx, w, h) {
  const img = ctx.getImageData(0, 0, w, h);
  const d = img.data;

  let rowCounts = [];

  for (let y = 0; y < h; y++) {
    let count = 0;
    for (let x = 0; x < w; x++) {
      let i = (y * w + x) * 4;
      if (d[i] === 0) count++;
    }
    rowCounts.push(count);
  }

  let threshold = Math.max(...rowCounts) * 0.6;

  let lines = [];
  rowCounts.forEach((val, y) => {
    if (val > threshold) lines.push(y);
  });

  let staffLines = [];
  for (let i = 0; i < lines.length; i++) {
    if (i === 0 || lines[i] - lines[i-1] > 2) {
      staffLines.push(lines[i]);
    }
  }

  output.innerHTML += "<br>Staff lines: " + staffLines.length;

  detectBlobs(ctx, w, h, staffLines);
}

// BLOBS
function detectBlobs(ctx, w, h, staffLines) {
  const img = ctx.getImageData(0, 0, w, h);
  const d = img.data;

  const visited = new Uint8Array(w * h);
  let blobs = [];

  function floodFill(x, y) {
    let stack = [{x, y}];
    let pixels = [];

    while (stack.length) {
      let {x, y} = stack.pop();
      let idx = y * w + x;

      if (visited[idx]) continue;
      visited[idx] = 1;

      let i = idx * 4;
      if (d[i] !== 0) continue;

      pixels.push({x, y});

      for (let dx = -1; dx <= 1; dx++) {
        for (let dy = -1; dy <= 1; dy++) {
          let nx = x + dx;
          let ny = y + dy;

          if (nx >= 0 && ny >= 0 && nx < w && ny < h) {
            stack.push({x: nx, y: ny});
          }
        }
      }
    }

    return pixels;
  }

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      let idx = y * w + x;
      if (!visited[idx]) {
        let blob = floodFill(x, y);
        if (blob.length > 0) blobs.push(blob);
      }
    }
  }

  scoreNoteheads(blobs, staffLines);
}

// ✅ SCORE FIRST
function scoreNoteheads(blobs, staffLines) {
  let scored = [];

  blobs.forEach(blob => {

    let size = blob.length;
    if (size < 10 || size > 800) return;

    let minX = Infinity, maxX = -Infinity;
    let minY = Infinity, maxY = -Infinity;

    blob.forEach(p => {
      if (p.x < minX) minX = p.x;
      if (p.x > maxX) maxX = p.x;
      if (p.y < minY) minY = p.y;
      if (p.y > maxY) maxY = p.y;
    });

    let width = maxX - minX;
    let height = maxY - minY;

    if (width < 3 || height < 3) return;

    let ratio = width / height;
    if (ratio < 0.3 || ratio > 3) return;

    let area = width * height;
    let density = size / area;

    let densityScore = 1 - Math.abs(density - 0.6);
    let shapeScore = 1 - Math.abs(ratio - 1);

    let score = densityScore * 0.6 + shapeScore * 0.4;

    let centerY = (minY + maxY) / 2;

    scored.push({
      centerY,
      score
    });

  });

  scored.sort((a, b) => b.score - a.score);

  let final = scored.slice(0, 220);

  output.innerHTML += "<br>Final NOTE HEADS: " + final.length;

  mapPitch(final, staffLines);
}

// 🎼 MAP PITCH
function mapPitch(notes, staffLines) {

  let pitches = [];

  notes.forEach(n => {

    let closestLine = staffLines.reduce((a, b) =>
      Math.abs(b - n.centerY) < Math.abs(a - n.centerY) ? b : a
    );

    let distance = n.centerY - closestLine;

    let step = Math.round(distance / 4);

    pitches.push(step);
  });

  output.innerHTML += "<br><b>Mapped notes: " + pitches.length + "</b>";
}
</script>

</body>
</html>
