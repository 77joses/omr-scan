  <!DOCTYPE html>
<html>
<head>
  <title>OMR v11 - Structured Detection</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #111;
      color: white;
    }

    canvas {
      width: 100%;
      margin-top: 20px;
      background: white;
    }

    #output {
      margin-top: 20px;
      background: #222;
      padding: 10px;
      font-size: 12px;
    }
  </style>
</head>

<body>

<h2>Upload Sheet Music</h2>

<input type="file" id="fileInput" accept="image/*">
<canvas id="canvas"></canvas>

<div id="output"></div>

<script>
document.getElementById("fileInput").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (file) loadImage(file);
});

function loadImage(file) {
  document.getElementById("output").innerHTML = "";

  const img = new Image();
  img.src = URL.createObjectURL(file);

  img.onload = () => {
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;

    ctx.drawImage(img, 0, 0);

    processImage(ctx, canvas.width, canvas.height);
  };
}

// STEP 1: Binarize
function processImage(ctx, w, h) {
  const imgData = ctx.getImageData(0, 0, w, h);
  const data = imgData.data;

  for (let i = 0; i < data.length; i += 4) {
    const avg = (data[i] + data[i+1] + data[i+2]) / 3;
    const value = avg > 150 ? 255 : 0;
    data[i] = data[i+1] = data[i+2] = value;
  }

  ctx.putImageData(imgData, 0, 0);

  detectStaffLines(ctx, w, h);
}

// STEP 2: Detect horizontal lines
function detectStaffLines(ctx, w, h) {
  const imgData = ctx.getImageData(0, 0, w, h);
  const data = imgData.data;

  let rowCounts = [];

  for (let y = 0; y < h; y++) {
    let count = 0;
    for (let x = 0; x < w; x++) {
      const i = (y * w + x) * 4;
      if (data[i] === 0) count++;
    }
    rowCounts.push(count);
  }

  const threshold = Math.max(...rowCounts) * 0.7;

  let lines = [];
  rowCounts.forEach((val, y) => {
    if (val > threshold) lines.push(y);
  });

  groupStaffs(lines);
}

// STEP 3: Group into staffs of 5
function groupStaffs(lines) {
  let staffs = [];
  let current = [lines[0]];

  for (let i = 1; i < lines.length; i++) {
    if (lines[i] - lines[i-1] < 8) {
      current.push(lines[i]);
    } else {
      if (current.length >= 5) staffs.push(current);
      current = [lines[i]];
    }
  }

  if (current.length >= 5) staffs.push(current);

  // keep only groups of exactly 5 lines
  staffs = staffs.filter(s => s.length === 5);

  document.getElementById("output").innerHTML += 
    "<pre>Staffs detected: " + staffs.length + "</pre>";

  processStaffs(staffs);
}

// STEP 4: Process each staff
function processStaffs(staffs) {
  let totalHeads = 0;

  staffs.forEach((staff, index) => {

    let spacing = (staff[4] - staff[0]) / 4;

    document.getElementById("output").innerHTML += 
      "<pre>Staff " + (index+1) + " spacing: " + spacing.toFixed(2) + "</pre>";

    // Later: detect note heads per staff (next upgrade)
  });
}
</script>

</body>
</html>
