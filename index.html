<!DOCTYPE html>
<html>
<head>
  <title>OMR v16.2 - Stabilized Detection</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #111;
      color: white;
    }

    canvas {
      width: 100%;
      margin-top: 20px;
      background: white;
    }

    #output {
      margin-top: 20px;
      background: #222;
      padding: 10px;
      font-size: 13px;
    }
  </style>
</head>

<body>

<h2>Upload Sheet Music</h2>

<input type="file" id="fileInput" accept="image/*">
<canvas id="canvas"></canvas>

<div id="output">Ready...</div>

<script>
const input = document.getElementById("fileInput");
const output = document.getElementById("output");

input.addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;

  output.innerHTML = "Loading image...";

  const img = new Image();
  img.src = URL.createObjectURL(file);

  img.onload = () => {
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;

    ctx.drawImage(img, 0, 0);

    processImage(ctx, canvas.width, canvas.height);
  };
});

// STEP 1: BINARIZE
function processImage(ctx, w, h) {
  output.innerHTML += "<br>Processing image...";

  const img = ctx.getImageData(0, 0, w, h);
  const d = img.data;

  for (let i = 0; i < d.length; i += 4) {
    const avg = (d[i] + d[i+1] + d[i+2]) / 3;
    const val = avg > 165 ? 255 : 0;
    d[i] = d[i+1] = d[i+2] = val;
  }

  ctx.putImageData(img, 0, 0);

  strengthenPixels(ctx, w, h);
}

// STEP 2: LIGHT PIXEL STRENGTHENING 🔥
function strengthenPixels(ctx, w, h) {
  const img = ctx.getImageData(0, 0, w, h);
  const d = img.data;

  for (let y = 1; y < h - 1; y++) {
    for (let x = 1; x < w - 1; x++) {

      let i = (y * w + x) * 4;

      if (d[i] === 255) {
        let neighbors = 0;

        for (let dx = -1; dx <= 1; dx++) {
          for (let dy = -1; dy <= 1; dy++) {
            let nx = x + dx;
            let ny = y + dy;
            let ni = (ny * w + nx) * 4;

            if (d[ni] === 0) neighbors++;
          }
        }

        // if surrounded by black → fill gap
        if (neighbors >= 5) {
          d[i] = d[i+1] = d[i+2] = 0;
        }
      }
    }
  }

  ctx.putImageData(img, 0, 0);

  detectBlobs(ctx, w, h);
}

// STEP 3: BLOBS
function detectBlobs(ctx, w, h) {
  output.innerHTML += "<br>Detecting blobs...";

  const img = ctx.getImageData(0, 0, w, h);
  const d = img.data;

  const visited = new Uint8Array(w * h);
  let blobs = [];

  function floodFill(x, y) {
    let stack = [{x, y}];
    let pixels = [];

    while (stack.length) {
      let {x, y} = stack.pop();
      let idx = y * w + x;

      if (visited[idx]) continue;
      visited[idx] = 1;

      let i = idx * 4;
      if (d[i] !== 0) continue;

      pixels.push({x, y});

      for (let dx = -1; dx <= 1; dx++) {
        for (let dy = -1; dy <= 1; dy++) {
          let nx = x + dx;
          let ny = y + dy;

          if (nx >= 0 && ny >= 0 && nx < w && ny < h) {
            stack.push({x: nx, y: ny});
          }
        }
      }
    }

    return pixels;
  }

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      let idx = y * w + x;
      if (!visited[idx]) {
        let blob = floodFill(x, y);
        if (blob.length > 0) blobs.push(blob);
      }
    }
  }

  output.innerHTML += "<br>Total blobs: " + blobs.length;

  filterHeads(blobs);
}

// STEP 4: FINAL FILTER (simple + robust)
function filterHeads(blobs) {
  output.innerHTML += "<br>Filtering note heads...";

  let heads = [];

  blobs.forEach(blob => {
    let size = blob.length;

    // new balanced range
    if (size < 25 || size > 400) return;

    let minX = Infinity, maxX = -Infinity;
    let minY = Infinity, maxY = -Infinity;

    blob.forEach(p => {
      if (p.x < minX) minX = p.x;
      if (p.x > maxX) maxX = p.x;
      if (p.y < minY) minY = p.y;
      if (p.y > maxY) maxY = p.y;
    });

    let width = maxX - minX;
    let height = maxY - minY;

    if (width < 5 || height < 5) return;

    let ratio = width / height;

    if (ratio > 0.5 && ratio < 1.8) {
      heads.push(blob);
    }
  });

  output.innerHTML += "<br><b>Detected NOTE HEADS: " + heads.length + "</b>";
}
</script>

</body>
</html>
