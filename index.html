  <!DOCTYPE html>
<html>
<head>
  <title>OMR Test</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #111;
      color: white;
    }

    canvas {
      width: 100%;
      margin-top: 20px;
      background: white;
    }

    #output {
      margin-top: 20px;
      background: #222;
      padding: 10px;
      font-size: 12px;
    }
  </style>
</head>

<body>

<h2>Upload Sheet Music</h2>

<input type="file" id="fileInput" accept="image/*">
<canvas id="canvas"></canvas>

<div id="output"></div>

<script>
document.getElementById("fileInput").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (file) loadImage(file);
});

function loadImage(file) {
  document.getElementById("output").innerHTML = "";

  const img = new Image();
  img.src = URL.createObjectURL(file);

  img.onload = () => {
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;

    ctx.drawImage(img, 0, 0);

    processImage(ctx, canvas.width, canvas.height);
  };
}

// STEP 1: Binarize
function processImage(ctx, w, h) {
  const imgData = ctx.getImageData(0, 0, w, h);
  const data = imgData.data;

  for (let i = 0; i < data.length; i += 4) {
    const avg = (data[i] + data[i+1] + data[i+2]) / 3;
    const value = avg > 150 ? 255 : 0;

    data[i] = data[i+1] = data[i+2] = value;
  }

  ctx.putImageData(imgData, 0, 0);

  detectStaffLines(ctx, w, h);
}

// STEP 2: Detect staff lines
function detectStaffLines(ctx, w, h) {
  const imgData = ctx.getImageData(0, 0, w, h);
  const data = imgData.data;

  let rowCounts = [];

  for (let y = 0; y < h; y++) {
    let count = 0;

    for (let x = 0; x < w; x++) {
      const i = (y * w + x) * 4;
      if (data[i] === 0) count++;
    }

    rowCounts.push(count);
  }

  const threshold = Math.max(...rowCounts) * 0.7;

  let lines = [];
  rowCounts.forEach((val, y) => {
    if (val > threshold) lines.push(y);
  });

  groupLines(lines, ctx, w, h);
}

// STEP 3: Group into staffs
function groupLines(lines, ctx, w, h) {
  let staffs = [];
  let current = [lines[0]];

  for (let i = 1; i < lines.length; i++) {
    if (lines[i] - lines[i-1] < 10) {
      current.push(lines[i]);
    } else {
      if (current.length >= 5) staffs.push(current);
      current = [lines[i]];
    }
  }

  if (current.length >= 5) staffs.push(current);

  document.getElementById("output").innerHTML += 
    "<pre>Staffs: " + staffs.length + "</pre>";

  removeLines(ctx, w, h, staffs);
}

// STEP 4: Remove lines
function removeLines(ctx, w, h, staffs) {
  const imgData = ctx.getImageData(0, 0, w, h);
  const data = imgData.data;

  staffs.forEach(staff => {
    staff.forEach(y => {
      for (let x = 0; x < w; x++) {
        const i = (y * w + x) * 4;
        data[i] = data[i+1] = data[i+2] = 255;
      }
    });
  });

  ctx.putImageData(imgData, 0, 0);

  detectBlobs(ctx, w, h, staffs);
}

// STEP 5: Blob detection
function detectBlobs(ctx, w, h, staffs) {
  const imgData = ctx.getImageData(0, 0, w, h);
  const data = imgData.data;

  const visited = new Uint8Array(w * h);
  let blobs = [];

  function floodFill(x, y) {
    let stack = [{x, y}];
    let pixels = [];

    while (stack.length) {
      let {x, y} = stack.pop();
      let idx = y * w + x;

      if (visited[idx]) continue;
      visited[idx] = 1;

      let i = idx * 4;
      if (data[i] !== 0) continue;

      pixels.push({x, y});

      for (let dx = -1; dx <= 1; dx++) {
        for (let dy = -1; dy <= 1; dy++) {
          let nx = x + dx;
          let ny = y + dy;

          if (nx >= 0 && ny >= 0 && nx < w && ny < h) {
            stack.push({x: nx, y: ny});
          }
        }
      }
    }

    return pixels;
  }

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      let idx = y * w + x;
      if (!visited[idx]) {
        let blob = floodFill(x, y);
        if (blob.length > 0) blobs.push(blob);
      }
    }
  }

  filterNotes(blobs, staffs);
}

// STEP 6: Staff-aware filtering (🔥 KEY)
function filterNotes(blobs, staffs) {
  let notes = [];

  blobs.forEach(blob => {
    const size = blob.length;

    let sumY = 0;
    blob.forEach(p => sumY += p.y);
    const centerY = sumY / blob.length;

    let nearStaff = false;

    staffs.forEach(staff => {
      const top = staff[0];
      const bottom = staff[4];

      if (centerY > top - 20 && centerY < bottom + 20) {
        nearStaff = true;
      }
    });

    if (
      nearStaff &&
      size > 30 && size < 400
    ) {
      notes.push(blob);
    }
  });

  document.getElementById("output").innerHTML += 
    "<pre>Final notes: " + notes.length + "</pre>";
}
</script>

</body>
</html>
