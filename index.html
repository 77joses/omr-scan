<!DOCTYPE html>
<html>
<head>
  <title>OMR v12 - Staff Detection</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #111;
      color: white;
    }

    canvas {
      width: 100%;
      margin-top: 20px;
      background: white;
    }

    #output {
      margin-top: 20px;
      background: #222;
      padding: 10px;
      font-size: 13px;
    }
  </style>
</head>

<body>

<h2>Upload Sheet Music</h2>

<input type="file" id="fileInput" accept="image/*">
<canvas id="canvas"></canvas>

<div id="output"></div>

<script>
const input = document.getElementById("fileInput");
const output = document.getElementById("output");

input.addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;

  output.innerHTML = "";

  const img = new Image();
  img.src = URL.createObjectURL(file);

  img.onload = () => {
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;

    ctx.drawImage(img, 0, 0);

    processImage(ctx, canvas.width, canvas.height);
  };
});

// STEP 1: BINARIZE
function processImage(ctx, w, h) {
  const img = ctx.getImageData(0, 0, w, h);
  const d = img.data;

  for (let i = 0; i < d.length; i += 4) {
    const avg = (d[i] + d[i+1] + d[i+2]) / 3;
    const val = avg > 160 ? 255 : 0;
    d[i] = d[i+1] = d[i+2] = val;
  }

  ctx.putImageData(img, 0, 0);

  detectStaffCandidates(ctx, w, h);
}

// STEP 2: FIND ALL HORIZONTAL CANDIDATES
function detectStaffCandidates(ctx, w, h) {
  const img = ctx.getImageData(0, 0, w, h);
  const d = img.data;

  let rows = [];

  for (let y = 0; y < h; y++) {
    let count = 0;

    for (let x = 0; x < w; x++) {
      const i = (y * w + x) * 4;
      if (d[i] === 0) count++;
    }

    // LOW threshold so we don't miss faint lines
    if (count > w * 0.15) {
      rows.push(y);
    }
  }

  groupIntoStaffs(rows);
}

// STEP 3: GROUP INTO REAL STAFFS
function groupIntoStaffs(lines) {
  let staffs = [];

  for (let i = 0; i < lines.length - 4; i++) {

    let l1 = lines[i];
    let l2 = lines[i+1];
    let l3 = lines[i+2];
    let l4 = lines[i+3];
    let l5 = lines[i+4];

    let d1 = l2 - l1;
    let d2 = l3 - l2;
    let d3 = l4 - l3;
    let d4 = l5 - l4;

    // equal spacing check
    if (
      Math.abs(d1 - d2) < 3 &&
      Math.abs(d2 - d3) < 3 &&
      Math.abs(d3 - d4) < 3 &&
      d1 > 3 && d1 < 30
    ) {
      staffs.push([l1, l2, l3, l4, l5]);
      i += 4; // skip ahead
    }
  }

  displayStaffs(staffs);
}

// STEP 4: DISPLAY RESULTS
function displayStaffs(staffs) {
  output.innerHTML += "<pre>Staffs detected: " + staffs.length + "</pre>";

  staffs.forEach((staff, i) => {
    const spacing = (staff[4] - staff[0]) / 4;

    output.innerHTML += 
      "<pre>Staff " + (i+1) + 
      " → lines: " + staff.join(", ") +
      " | spacing: " + spacing.toFixed(2) + "</pre>";
  });
}
</script>

</body>
</html>
