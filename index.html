<!DOCTYPE html>
<html>
<head>
  <title>OMR v13 - Real Staff Detection</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #111;
      color: white;
    }

    canvas {
      width: 100%;
      margin-top: 20px;
      background: white;
    }

    #output {
      margin-top: 20px;
      background: #222;
      padding: 10px;
      font-size: 13px;
    }
  </style>
</head>

<body>

<h2>Upload Sheet Music</h2>

<input type="file" id="fileInput" accept="image/*">
<canvas id="canvas"></canvas>

<div id="output"></div>

<script>
const input = document.getElementById("fileInput");
const output = document.getElementById("output");

input.addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;

  output.innerHTML = "";

  const img = new Image();
  img.src = URL.createObjectURL(file);

  img.onload = () => {
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;

    ctx.drawImage(img, 0, 0);

    processImage(ctx, canvas.width, canvas.height);
  };
});

// STEP 1: BINARIZE (stronger)
function processImage(ctx, w, h) {
  const img = ctx.getImageData(0, 0, w, h);
  const d = img.data;

  for (let i = 0; i < d.length; i += 4) {
    const avg = (d[i] + d[i+1] + d[i+2]) / 3;
    const val = avg > 140 ? 255 : 0; // lowered threshold
    d[i] = d[i+1] = d[i+2] = val;
  }

  ctx.putImageData(img, 0, 0);

  detectLines(ctx, w, h);
}

// STEP 2: DETECT TRUE HORIZONTAL LINES
function detectLines(ctx, w, h) {
  const img = ctx.getImageData(0, 0, w, h);
  const d = img.data;

  let candidates = [];

  for (let y = 0; y < h; y++) {
    let maxRun = 0;
    let currentRun = 0;

    for (let x = 0; x < w; x++) {
      const i = (y * w + x) * 4;

      if (d[i] === 0) {
        currentRun++;
        if (currentRun > maxRun) maxRun = currentRun;
      } else {
        currentRun = 0;
      }
    }

    // must be long horizontal segment
    if (maxRun > w * 0.4) {
      candidates.push(y);
    }
  }

  groupStaffs(candidates);
}

// STEP 3: GROUP INTO STAFFS
function groupStaffs(lines) {
  let staffs = [];

  for (let i = 0; i < lines.length - 4; i++) {

    let group = [
      lines[i],
      lines[i+1],
      lines[i+2],
      lines[i+3],
      lines[i+4]
    ];

    let d1 = group[1] - group[0];
    let d2 = group[2] - group[1];
    let d3 = group[3] - group[2];
    let d4 = group[4] - group[3];

    if (
      Math.abs(d1 - d2) < 3 &&
      Math.abs(d2 - d3) < 3 &&
      Math.abs(d3 - d4) < 3 &&
      d1 > 4 && d1 < 25
    ) {
      staffs.push(group);
      i += 4;
    }
  }

  displayStaffs(staffs);
}

// STEP 4: DISPLAY
function displayStaffs(staffs) {
  output.innerHTML += "<pre>Staffs detected: " + staffs.length + "</pre>";

  staffs.forEach((s, i) => {
    let spacing = (s[4] - s[0]) / 4;

    output.innerHTML += 
      "<pre>Staff " + (i+1) +
      " | spacing: " + spacing.toFixed(2) + "</pre>";
  });
}
</script>

</body>
</html>
