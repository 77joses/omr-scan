<!DOCTYPE html>
<html>
<head>
  <title>OMR v18 - Negative Filter Engine</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #111;
      color: white;
    }

    canvas {
      width: 100%;
      margin-top: 20px;
      background: white;
    }

    #output {
      margin-top: 20px;
      background: #222;
      padding: 10px;
      font-size: 13px;
    }
  </style>
</head>

<body>

<h2>Upload Sheet Music</h2>

<input type="file" id="fileInput" accept="image/*">
<canvas id="canvas"></canvas>

<div id="output">Ready...</div>

<script>
const input = document.getElementById("fileInput");
const output = document.getElementById("output");

input.addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;

  output.innerHTML = "Loading image...";

  const img = new Image();
  img.src = URL.createObjectURL(file);

  img.onload = () => {
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;

    ctx.drawImage(img, 0, 0);

    processImage(ctx, canvas.width, canvas.height);
  };
});

// STEP 1: BINARIZE
function processImage(ctx, w, h) {
  output.innerHTML += "<br>Processing image...";

  const img = ctx.getImageData(0, 0, w, h);
  const d = img.data;

  for (let i = 0; i < d.length; i += 4) {
    const avg = (d[i] + d[i+1] + d[i+2]) / 3;
    const val = avg > 165 ? 255 : 0;
    d[i] = d[i+1] = d[i+2] = val;
  }

  ctx.putImageData(img, 0, 0);

  detectStaffGap(ctx, w, h);
}

// STEP 2: STAFF GAP (for grid)
function detectStaffGap(ctx, w, h) {
  const img = ctx.getImageData(0, 0, w, h);
  const d = img.data;

  let rowCounts = [];

  for (let y = 0; y < h; y++) {
    let count = 0;
    for (let x = 0; x < w; x++) {
      let i = (y * w + x) * 4;
      if (d[i] === 0) count++;
    }
    rowCounts.push(count);
  }

  let peaks = [];
  let threshold = Math.max(...rowCounts) * 0.6;

  rowCounts.forEach((val, y) => {
    if (val > threshold) peaks.push(y);
  });

  let gaps = [];
  for (let i = 1; i < peaks.length; i++) {
    let g = peaks[i] - peaks[i-1];
    if (g > 2 && g < 50) gaps.push(g);
  }

  let freq = {};
  gaps.forEach(g => {
    let k = Math.round(g);
    freq[k] = (freq[k] || 0) + 1;
  });

  let bestGap = 0, max = 0;
  for (let k in freq) {
    if (freq[k] > max) {
      max = freq[k];
      bestGap = parseInt(k);
    }
  }

  output.innerHTML += "<br>Staff gap: " + bestGap;

  detectBlobs(ctx, w, h, bestGap);
}

// STEP 3: BLOBS
function detectBlobs(ctx, w, h, gap) {
  output.innerHTML += "<br>Detecting blobs...";

  const img = ctx.getImageData(0, 0, w, h);
  const d = img.data;

  const visited = new Uint8Array(w * h);
  let blobs = [];

  function floodFill(x, y) {
    let stack = [{x, y}];
    let pixels = [];

    while (stack.length) {
      let {x, y} = stack.pop();
      let idx = y * w + x;

      if (visited[idx]) continue;
      visited[idx] = 1;

      let i = idx * 4;
      if (d[i] !== 0) continue;

      pixels.push({x, y});

      for (let dx = -1; dx <= 1; dx++) {
        for (let dy = -1; dy <= 1; dy++) {
          let nx = x + dx;
          let ny = y + dy;

          if (nx >= 0 && ny >= 0 && nx < w && ny < h) {
            stack.push({x: nx, y: ny});
          }
        }
      }
    }

    return pixels;
  }

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      let idx = y * w + x;
      if (!visited[idx]) {
        let blob = floodFill(x, y);
        if (blob.length > 0) blobs.push(blob);
      }
    }
  }

  output.innerHTML += "<br>Total blobs: " + blobs.length;

  negativeFilter(blobs, gap);
}

// STEP 4: NEGATIVE FILTER 🔥
function negativeFilter(blobs, gap) {
  let kept = [];

  blobs.forEach(blob => {

    let size = blob.length;

    // ❌ REMOVE VERY SMALL (lyrics, dots)
    if (size < 20) return;

    // ❌ REMOVE VERY LARGE (clefs, symbols)
    if (size > 600) return;

    let minX = Infinity, maxX = -Infinity;
    let minY = Infinity, maxY = -Infinity;

    blob.forEach(p => {
      if (p.x < minX) minX = p.x;
      if (p.x > maxX) maxX = p.x;
      if (p.y < minY) minY = p.y;
      if (p.y > maxY) maxY = p.y;
    });

    let width = maxX - minX;
    let height = maxY - minY;

    // ❌ REMOVE THIN SHAPES (lyrics, dynamics)
    if (width < 4 || height < 4) return;

    let ratio = width / height;

    // ❌ REMOVE VERTICAL (numbers, stems)
    if (ratio < 0.3) return;

    // ❌ REMOVE HORIZONTAL (beams)
    if (ratio > 3) return;

    // ❌ REMOVE NON-GRID (lyrics, rests)
    let centerY = (minY + maxY) / 2;
    let r = centerY % gap;

    if (!(r < gap * 0.25 || r > gap * 0.75)) return;

    // ✅ KEEP (likely note head)
    kept.push(blob);

  });

  output.innerHTML += "<br><b>Remaining (NOTE HEADS): " + kept.length + "</b>";
}
</script>

</body>
</html>
