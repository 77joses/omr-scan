<!DOCTYPE html>
<html>
<head>
  <title>OMR Test</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #111;
      color: white;
    }

    canvas {
      width: 100%;
      margin-top: 20px;
      background: white;
    }

    #output {
      margin-top: 20px;
      background: #222;
      padding: 10px;
      font-size: 12px;
    }
  </style>
</head>

<body>

<h2>Upload Sheet Music</h2>

<input type="file" id="fileInput" accept="image/*">
<canvas id="canvas"></canvas>

<div id="output"></div>

<script>
document.getElementById("fileInput").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (file) loadImage(file);
});

function loadImage(file) {
  document.getElementById("output").innerHTML = "";

  const img = new Image();
  img.src = URL.createObjectURL(file);

  img.onload = () => {
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;

    ctx.drawImage(img, 0, 0);

    processImage(ctx, canvas.width, canvas.height);
  };
}

// STEP 1: Binarize
function processImage(ctx, w, h) {
  const imgData = ctx.getImageData(0, 0, w, h);
  const data = imgData.data;

  for (let i = 0; i < data.length; i += 4) {
    const avg = (data[i] + data[i+1] + data[i+2]) / 3;
    const value = avg > 150 ? 255 : 0;

    data[i] = data[i+1] = data[i+2] = value;
  }

  ctx.putImageData(imgData, 0, 0);

  removeHorizontalLines(ctx, w, h);
}

// STEP 2: Remove horizontal lines
function removeHorizontalLines(ctx, w, h) {
  const imgData = ctx.getImageData(0, 0, w, h);
  const data = imgData.data;

  for (let y = 0; y < h; y++) {
    let blackCount = 0;

    for (let x = 0; x < w; x++) {
      const i = (y * w + x) * 4;
      if (data[i] === 0) blackCount++;
    }

    if (blackCount > w * 0.6) {
      for (let x = 0; x < w; x++) {
        const i = (y * w + x) * 4;
        data[i] = data[i+1] = data[i+2] = 255;
      }
    }
  }

  ctx.putImageData(imgData, 0, 0);

  detectBlobs(ctx, w, h);
}

// STEP 3: Blob detection
function detectBlobs(ctx, w, h) {
  const imgData = ctx.getImageData(0, 0, w, h);
  const data = imgData.data;

  const visited = new Uint8Array(w * h);
  let blobs = [];

  function floodFill(x, y) {
    let stack = [{x, y}];
    let pixels = [];

    while (stack.length) {
      let {x, y} = stack.pop();
      let idx = y * w + x;

      if (visited[idx]) continue;
      visited[idx] = 1;

      let i = idx * 4;
      if (data[i] !== 0) continue;

      pixels.push({x, y});

      for (let dx = -1; dx <= 1; dx++) {
        for (let dy = -1; dy <= 1; dy++) {
          let nx = x + dx;
          let ny = y + dy;

          if (nx >= 0 && ny >= 0 && nx < w && ny < h) {
            stack.push({x: nx, y: ny});
          }
        }
      }
    }

    return pixels;
  }

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      let idx = y * w + x;
      if (!visited[idx]) {
        let blob = floodFill(x, y);
        if (blob.length > 0) blobs.push(blob);
      }
    }
  }

  filterNotes(blobs);
}

// STEP 4: ROW FILTER (🔥 key improvement)
function filterNotes(blobs) {
  let candidates = [];

  blobs.forEach(blob => {
    if (blob.length > 30 && blob.length < 400) {

      let sumY = 0;
      blob.forEach(p => sumY += p.y);
      const centerY = sumY / blob.length;

      candidates.push({blob, centerY});
    }
  });

  // Group into horizontal rows
  let rows = [];

  candidates.forEach(note => {
    let placed = false;

    for (let row of rows) {
      if (Math.abs(row.y - note.centerY) < 5) {
        row.notes.push(note);
        placed = true;
        break;
      }
    }

    if (!placed) {
      rows.push({y: note.centerY, notes: [note]});
    }
  });

  // Keep only rows with MANY notes (real music lines)
  let finalNotes = [];

  rows.forEach(row => {
    if (row.notes.length > 8) { // 🔥 threshold
      row.notes.forEach(n => finalNotes.push(n));
    }
  });

  document.getElementById("output").innerHTML += 
    "<pre>Final notes: " + finalNotes.length + "</pre>";
}
</script>

</body>
</html>
