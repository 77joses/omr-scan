<!DOCTYPE html>
<html>
<head>
  <title>OMR v10 - Note Head Detection</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #111;
      color: white;
    }

    canvas {
      width: 100%;
      margin-top: 20px;
      background: white;
    }

    #output {
      margin-top: 20px;
      background: #222;
      padding: 10px;
      font-size: 12px;
    }
  </style>
</head>

<body>

<h2>Upload Sheet Music</h2>

<input type="file" id="fileInput" accept="image/*">
<canvas id="canvas"></canvas>

<div id="output"></div>

<script>
document.getElementById("fileInput").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (file) loadImage(file);
});

function loadImage(file) {
  document.getElementById("output").innerHTML = "";

  const img = new Image();
  img.src = URL.createObjectURL(file);

  img.onload = () => {
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;

    ctx.drawImage(img, 0, 0);

    processImage(ctx, canvas.width, canvas.height);
  };
}

// STEP 1: Clean binary image
function processImage(ctx, w, h) {
  const imgData = ctx.getImageData(0, 0, w, h);
  const data = imgData.data;

  for (let i = 0; i < data.length; i += 4) {
    const avg = (data[i] + data[i+1] + data[i+2]) / 3;
    const value = avg > 150 ? 255 : 0;

    data[i] = data[i+1] = data[i+2] = value;
  }

  ctx.putImageData(imgData, 0, 0);

  detectBlobs(ctx, w, h);
}

// STEP 2: Blob detection
function detectBlobs(ctx, w, h) {
  const imgData = ctx.getImageData(0, 0, w, h);
  const data = imgData.data;

  const visited = new Uint8Array(w * h);
  let blobs = [];

  function floodFill(x, y) {
    let stack = [{x, y}];
    let pixels = [];

    while (stack.length) {
      let {x, y} = stack.pop();
      let idx = y * w + x;

      if (visited[idx]) continue;
      visited[idx] = 1;

      let i = idx * 4;
      if (data[i] !== 0) continue;

      pixels.push({x, y});

      for (let dx = -1; dx <= 1; dx++) {
        for (let dy = -1; dy <= 1; dy++) {
          let nx = x + dx;
          let ny = y + dy;

          if (nx >= 0 && ny >= 0 && nx < w && ny < h) {
            stack.push({x: nx, y: ny});
          }
        }
      }
    }

    return pixels;
  }

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      let idx = y * w + x;
      if (!visited[idx]) {
        let blob = floodFill(x, y);
        if (blob.length > 0) blobs.push(blob);
      }
    }
  }

  detectNoteHeads(blobs);
}

// STEP 3: NOTE HEAD FILTER 🔥
function detectNoteHeads(blobs) {
  let heads = [];

  blobs.forEach(blob => {

    const size = blob.length;

    // ignore very small / very large
    if (size < 20 || size > 300) return;

    let minX = Infinity, maxX = -Infinity;
    let minY = Infinity, maxY = -Infinity;

    blob.forEach(p => {
      if (p.x < minX) minX = p.x;
      if (p.x > maxX) maxX = p.x;
      if (p.y < minY) minY = p.y;
      if (p.y > maxY) maxY = p.y;
    });

    const width = maxX - minX;
    const height = maxY - minY;

    // avoid vertical shapes (stems)
    if (height > width * 1.8) return;

    const ratio = width / height;
    const area = width * height;
    const density = size / area;

    // 🎯 HEAD CONDITIONS
    if (
      width > 5 && width < 20 &&
      height > 5 && height < 20 &&
      ratio > 0.6 && ratio < 1.6 &&
      density > 0.35
    ) {
      heads.push(blob);
    }
  });

  document.getElementById("output").innerHTML += 
    "<pre>Detected NOTE HEADS: " + heads.length + "</pre>";
}
</script>

</body>
</html>
